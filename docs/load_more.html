<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <title>Gallery</title>
        <style>
        /* 毛玻璃导航栏 */
        .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        backdrop-filter: blur(12px);
        background: rgba(255,255,255,0.5);
        padding: 18px 22px;
        font-size: 20px;
        font-weight: 600;
        z-index: 999;
        border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        body {
            font-family: sans-serif;
            margin: 0;
            background: #ede7ea;
            padding: 20px;
        }

        h2 {
            text-align: center;
            font-weight: 300;
            margin-bottom: 25px;
        }
        
        /* 瀑布流布局 */
        .masonry {
            column-count: 4;                   /* Number of columns */
            column-gap: 15px;               /* Space between columns */
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }


        /* Image container */
        .masonry img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 12px;
            opacity: 0;                      /* Start invisible */
            transform: translateY(20px);        /* Start shifted down */
            animation: fadeIn 0.8s ease forwards;
            break-inside: avoid;
        }

        /*渐变effect*/
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }


        /*调整尺寸： 适应both手机和电脑 */
        @media (max-width: 1200px) {
            .masonry { column-count: 3; }
        }
        @media (max-width: 800px) {
            .masonry { column-count: 2; }
        }
        @media (max-width: 500px) {
            .masonry { column-count: 1; }
        }

        /* Loading Spinner 加载特效，use before the first image is loaded */
        .loader {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        }

        /*淡入特效，每个图片加载进去的时候使用*/
        /* Fade-in effect when loaded */
        .loaded {
            opacity: 1;
            transform: translateY(0);
        }

        /*加载到最后一张后自动停止 spinner*/
        .spinner {
        width: 50px;
        height: 50px;
        border: 6px solid #ddd;
        border-top-color: #555;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        }

        @keyframes spin {
        to { transform: rotate(360deg); }
        }
        </style>
    </head>

    <body>
        <!--毛玻璃导航栏 -->
        <div class="navbar">Gallery</div>
        <!--载入特效-->
        <div class="loader">
            <div class="spinner"></div>
        </div>

        <h2 id="title">Gallery</h2>
        <div id="gallery" class="masonry"> </div>
        <script>
        // Get folder name from URL生成一个specify的title
            const params = new URLSearchParams(window.location.search);
            const folder = new URLSearchParams(window.location.search).get("folder") || "default";

            const title = document.getElementById("title");
            const gallery = document.getElementById("gallery");
            const loader = document.getElementById("loader");

            title.innerText = " Gallery for " + folder ;
            
            const extensions = ["jpg", "jpeg", "png", "webp","JPG", "JPEG", "PNG", "WEBP"]; //拓展文件名，兼容更多种类图片
            let maxTry = 200;          // 最多尝试多少（安全区）
            let failLimit = 5;         // 连续失败次数后停止
            let failCounter = 0;       // 当前连续失败次数
            let currentIndex = 1;      //当前index

            // Try to load:兼容01，02和直接1，2，3.。。
            // 01.jpg → 404 → try 01.jpeg → ...
            //then try 1.jpg → 404 → try 1.jpeg → ...
        function pad(num){ return num<10 ? "0"+num : num; }

            function tryLoadImage(index){
                return new Promise((resolve, reject)=>{
                    let names = [pad(index), String(Number(index))];
                    let nameIndex=0, extIndex=0;

                    function tryNext(){
                        if(nameIndex>=names.length){
                            reject(false);
                            return;
                        }
                        //固定的路径（根据我的layer）
                        const path = `images/${folder}/${names[nameIdx]}.${extensions[extIdx]}`;
                        const img = new Image();
                        img.src = path;
                        img.onload = ()=>resolve(img);
                        img.onerror = ()=>{
                            extIndex++;
                            if(extIndex<extensions.length){
                                tryNext();
                            } else {
                                extIndex=0;
                                nameIndex++;
                                tryNext();
                            }
                        };
                    }
                    tryNext();
                });
            }

            async function loadAllImages(){
                while(currentIndex <= maxImages){
                    try {
                        const img = await tryLoadImage(currentIndex);
                        gallery.appendChild(img);
                        failCounter = 0;
                    } catch(e){
                        failCounter++;
                        if(failCounter>=failLimit){
                            alert("Error: loading fail or folder finished");
                            break;
                        }
                    }
                    currentIndex++;
                }
                loader.style.display = "none";
            }

            loadAllImages();
        </script>
    </body>
</html>
