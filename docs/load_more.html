<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <title>Gallery</title>
        <style>
        /* 毛玻璃导航栏 */
        .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        backdrop-filter: blur(12px);
        background: rgba(255,255,255,0.5);
        padding: 18px 22px;
        font-size: 20px;
        font-weight: 600;
        z-index: 999;
        border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        body {
            font-family: sans-serif;
            margin: 0;
            background: #ede7ea;
            padding: 20px;
        }

        h2 {
            text-align: center;
            font-weight: 300;
            margin-bottom: 25px;
        }
        
        /* 瀑布流布局 */
        .masonry {
            column-count: 4;                   /* Number of columns */
            column-gap: 15px;               /* Space between columns */
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }


        /* Image container */
        .masonry img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 12px;
            opacity: 0;                      /* Start invisible */
            transform: translateY(20px);        /* Start shifted down */
            animation: fadeIn 0.8s ease forwards;
            break-inside: avoid;
        }

        /*渐变effect*/
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }


        /*调整尺寸： 适应both手机和电脑 */
        @media (max-width: 1200px) {
            .masonry { column-count: 3; }
        }
        @media (max-width: 800px) {
            .masonry { column-count: 2; }
        }
        @media (max-width: 500px) {
            .masonry { column-count: 1; }
        }

        /* Loading Spinner 加载特效，use before the first image is loaded */
        .loader {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        }

        @keyframes spin {
        to { transform: rotate(360deg); }
        }
        </style>
    </head>

    <body>
        <!--毛玻璃导航栏 -->
        <div class="navbar">Gallery</div>
        <!--载入特效-->
        <div class="loader">
            <div class="spinner"></div>
        </div>

        <h2 id="title">Gallery</h2>
        <div id="gallery" class="masonry"> </div>

    </body>
</html>
