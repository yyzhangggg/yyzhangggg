<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 30" width="600" height="30">
  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .f1{animation:float 2.5s ease-in-out infinite}
    .f2{animation:float 2.5s ease-in-out 0.4s infinite}
    .f3{animation:float 2.5s ease-in-out 0.8s infinite}
    .f4{animation:float 2.5s ease-in-out 1.2s infinite}
    .f5{animation:float 2.5s ease-in-out 1.6s infinite}
    .dot{animation:spin 8s linear infinite;transform-origin:center}
  </style>
  <defs>
    <g id="mini-sakura">
      <ellipse cx="0" cy="-4" rx="2.5" ry="4" fill="#FFB7C5" opacity="0.85"/>
      <ellipse cx="3.8" cy="-1.2" rx="2.5" ry="4" fill="#FFC4D0" opacity="0.8" transform="rotate(72)"/>
      <ellipse cx="2.3" cy="3.2" rx="2.5" ry="4" fill="#FFAEC0" opacity="0.8" transform="rotate(144)"/>
      <ellipse cx="-2.3" cy="3.2" rx="2.5" ry="4" fill="#FFD0DA" opacity="0.8" transform="rotate(216)"/>
      <ellipse cx="-3.8" cy="-1.2" rx="2.5" ry="4" fill="#FFA8BB" opacity="0.8" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="2" fill="#FFE4EC"/>
    </g>
  </defs>
  <line x1="50" y1="15" x2="550" y2="15" stroke="#FFD0DA" stroke-width="0.5" opacity="0.5"/>
  <g class="f1"><use href="#mini-sakura" x="150" y="15"/></g>
  <g class="f2"><use href="#mini-sakura" x="225" y="15"/></g>
  <g class="f3"><use href="#mini-sakura" x="300" y="15"/></g>
  <g class="f4"><use href="#mini-sakura" x="375" y="15"/></g>
  <g class="f5"><use href="#mini-sakura" x="450" y="15"/></g>
</svg>
